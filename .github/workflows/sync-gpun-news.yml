name: Sync GPUN media from Notion

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-media:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync Notion press
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_NEWS_DATA_SOURCE_ID: ${{ secrets.NOTION_NEWS_DATA_SOURCE_ID }}
          NEWS_OUTPUT_PATH: docs/assets/data/news.json
        run: node scripts/sync-notion-news.mjs

      - name: Sync Notion trailers
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_TRAILERS_DATA_SOURCE_ID: ${{ secrets.NOTION_TRAILERS_DATA_SOURCE_ID }}
          TRAILERS_OUTPUT_PATH: docs/assets/data/trailers.json
        run: |
          if [ -z "$NOTION_TRAILERS_DATA_SOURCE_ID" ]; then
            echo "Skipping trailer sync; NOTION_TRAILERS_DATA_SOURCE_ID is not configured."
            exit 0
          fi
          node scripts/sync-notion-trailers.mjs

      - name: Commit updated media data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p docs/assets/media/notion-thumbnails
          git add docs/assets/data/news.json docs/assets/data/trailers.json docs/assets/media/notion-thumbnails

          if git diff --cached --quiet; then
            echo "No media changes to commit."
            exit 0
          fi

          git commit -m "Update GPUN media data"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"
